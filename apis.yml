aid: overture-maps
url: https://raw.githubusercontent.com/api-evangelist/overture-maps/refs/heads/main/apis.yml
name: Overture Maps Foundation
kind: company
description: >-
  Overture Maps Foundation is a Linux Foundation collaborative project that
  produces free, open, and interoperable map data. Overture publishes
  cloud-native GeoParquet datasets, on a regular release cadence, across six
  themes - Addresses, Base, Buildings, Divisions, Places, and Transportation -
  governed by a common conflation pipeline and an open schema. Rather than a
  hosted REST API, Overture distributes data through Amazon S3 and Microsoft
  Azure (and via partner mirrors on BigQuery, Snowflake, Databricks, Fused,
  Wherobots), and provides an open Python CLI, a tile generator, and an
  Explorer site for developers. Founding members include Amazon, Meta,
  Microsoft, and TomTom.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Maps
  - Geospatial
  - Open Data
  - GeoParquet
  - Open Source
  - Linux Foundation
created: '2026-05-23'
modified: '2026-05-23'
